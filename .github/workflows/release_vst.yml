name: Release — doodlevox_vst

# Trigger on version tags for the VST plugin, or manually via the GitHub UI.
#
# Builds the plugin for all three supported platforms:
#   macOS   — VST3, AU (AudioUnit), and Standalone (.app) — universal binary (x86_64 + arm64)
#   Windows — VST3 and Standalone (.exe)
#   Linux   — VST3 and Standalone

on:
  push:
    tags:
      - "vst/v*"
  workflow_dispatch:

jobs:
  # ─── macOS ───────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (VST3 + AU + Standalone)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        working-directory: doodlevox_vst
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: doodlevox_vst
        run: cmake --build build --config Release

      - name: Create installer (macOS)
        working-directory: doodlevox_vst
        run: |
          # Build and package using the project helper script (creates installers via CPack)
          chmod +x package.sh || true
          ./package.sh Release
          # Normalize installer filename(s) for predictable upload
          mkdir -p build_installer/_published
          PKG=$(find build_installer -type f -name '*.pkg' -print -quit || true)
          if [ -n "$PKG" ]; then
            cp "$PKG" build_installer/_published/DoodleVox-macOS.pkg
          fi
          # Also copy any .dmg if produced
          DMG=$(find build_installer -type f -name '*.dmg' -print -quit || true)
          if [ -n "$DMG" ]; then
            cp "$DMG" build_installer/_published/DoodleVox-macOS.dmg
          fi

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: doodlevox_vst/build_installer/_published/
          if-no-files-found: error

  # ─── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (VST3 + Standalone)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        working-directory: doodlevox_vst
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        working-directory: doodlevox_vst
        run: cmake --build build --config Release

      - name: Ensure NSIS (for installer) is available
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y || true

      - name: Create installer (Windows)
        working-directory: doodlevox_vst
        shell: pwsh
        run: |
          # Configure and build installer output in build_installer
          cmake -B build_installer -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build_installer --config Release
          Push-Location build_installer
          cpack -C Release || true
          Pop-Location
          # Normalize installer for upload
          New-Item -ItemType Directory -Force -Path build_installer\_published | Out-Null
          $exe = Get-ChildItem -Path build_installer -Recurse -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName -Destination build_installer\_published\DoodleVox-Windows-Installer.exe -Force }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: doodlevox_vst/build_installer/_published/
          if-no-files-found: error

  # ─── Linux ───────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (VST3 + Standalone)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE system dependencies
        run: |
          # Ensure 'universe' repository is enabled so libwebkit2gtk is available
          sudo apt-get update
          sudo apt-get install -y software-properties-common || true
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libasound2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libglu1-mesa-dev \
            freeglut3-dev \
            mesa-common-dev \
            libcurl4-openssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            ladspa-sdk

      - name: Configure CMake
        working-directory: doodlevox_vst
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: doodlevox_vst
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Create installer (Linux)
        working-directory: doodlevox_vst
        run: |
          chmod +x package.sh || true
          ./package.sh Release
          mkdir -p build_installer/_published
          DEB=$(find build_installer -type f -name '*.deb' -print -quit || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" build_installer/_published/DoodleVox-Linux.deb
          fi

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: doodlevox_vst/build_installer/_published/
          if-no-files-found: error

  # ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload installers
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "doodlevox_vst ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Upload found installers to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload any installer files downloaded into the artifacts directory to the release
          set -e
          RELEASE_ID=$(jq -r '.id' < <(gh release view "${{ github.ref_name }}" --json id) 2>/dev/null || echo "") || true
          # If `gh` is not available, fallback to uploading via the action output (softprops leaves assets attached), otherwise attempt to use `gh` to upload
          if command -v gh >/dev/null 2>&1 && [ -n "$RELEASE_ID" ]; then
            for f in $(find artifacts -type f -maxdepth 3 -iregex '.*\(pkg\|dmg\|deb\|exe\)$' 2>/dev/null); do
              echo "Uploading $f to release $RELEASE_ID"
              gh release upload "${{ github.ref_name }}" "$f" --clobber || true
            done
          else
            echo "gh CLI not available or release not found; assets are still attached as workflow artifacts."
          fi
