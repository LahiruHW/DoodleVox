  # ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    # needs: [build-macos, build-windows, build-linux]
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload installers
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "doodlevox_vst ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: "Debug: list downloaded artifacts"
        shell: bash
        run: |
          echo "Listing artifacts/ before upload"
          ls -la artifacts || true
          find artifacts -maxdepth 4 -type f -exec ls -la {} \; || true

      - name: "Upload found installers to release (REST API)"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Looking up release for tag $TAG in $REPO"
          API_URL="https://api.github.com/repos/$REPO/releases/tags/$TAG"
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL")
          RELEASE_ID=$(echo "$RESPONSE" | jq -r .id)
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Release not found for tag $TAG. Response: $RESPONSE"
            exit 1
          fi
          echo "Found release id: $RELEASE_ID"

          UPLOAD_BASE="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"

          # Find candidate installer files under artifacts/
          mapfile -t FILES < <(find artifacts -type f \( -iname '*.pkg' -o -iname '*.dmg' -o -iname '*.deb' -o -iname '*.exe' \) -print)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No installer files found in artifacts/ to upload."
            exit 0
          fi

          for f in "${FILES[@]}"; do
            NAME=$(basename "$f")
            echo "Uploading $NAME to release $RELEASE_ID..."
            curl --fail -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" "$UPLOAD_BASE?name=$NAME" || {
                echo "Failed to upload $NAME"; exit 1;
              }
            echo "Uploaded $NAME"
          done
