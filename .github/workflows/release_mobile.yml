name: Release — doodlevox_mobile

# Trigger on version tags for the mobile app, or manually via the GitHub UI.
#
# Required GitHub secrets for Android release signing:
#   ANDROID_KEYSTORE_BASE64  — base64-encoded JKS/PKCS12 keystore file
#   ANDROID_KEY_ALIAS        — key alias inside the keystore
#   ANDROID_KEY_PASSWORD     — key password
#   ANDROID_STORE_PASSWORD   — keystore password
#
# When these secrets are absent the Android build falls back to debug signing
# (suitable for testing, NOT for Play Store submission).

on:
  push:
    tags:
      - "mobile/v*"
  workflow_dispatch:

jobs:
  # ─── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: doodlevox_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Set up Android release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
              "${{ secrets.ANDROID_STORE_PASSWORD }}" \
              "${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "${{ secrets.ANDROID_KEY_ALIAS }}" \
              "app/keystore.jks" \
              > android/key.properties
            echo "Release signing configured."
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set — falling back to debug signing."
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: doodlevox_mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: doodlevox_mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  # ─── iOS ─────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (unsigned xcarchive)
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: doodlevox_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS archive (no code sign)
        run: flutter build ipa --release --no-codesign

      - name: Zip xcarchive
        run: |
          cd build/ios/archive
          zip -r DoodleVox-iOS.xcarchive.zip Runner.xcarchive

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: doodlevox_mobile/build/ios/archive/DoodleVox-iOS.xcarchive.zip
          if-no-files-found: error

  # ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "doodlevox_mobile ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/android-aab/app-release.aab
            artifacts/ios-xcarchive/DoodleVox-iOS.xcarchive.zip
