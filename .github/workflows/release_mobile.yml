name: Release — doodlevox_mobile

# Trigger on version tags for the mobile app, or manually via the GitHub UI.
#
# Required GitHub secrets for Android release signing:
#   ANDROID_KEYSTORE_BASE64  — base64-encoded JKS/PKCS12 keystore file
#   ANDROID_KEY_ALIAS        — key alias inside the keystore
#   ANDROID_KEY_PASSWORD     — key password
#   ANDROID_STORE_PASSWORD   — keystore password
#
# When these secrets are absent the Android build falls back to debug signing
# (suitable for testing, NOT for Play Store submission).

# Required GitHub secret for Play Store deployment:
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  — plain-text JSON key for a Google Play
#                                       service account with the "Release manager"
#                                       role (or at minimum "Releases" permission).
#                                       See: https://github.com/r0adkll/upload-google-play#setup
#
# The deploy-play-store job uploads the AAB to the production track on every tag
# push. Change `track` to internal / alpha / beta if a staged rollout is needed.

on:
  push:
    tags:
      - "mobile/v*"
  workflow_dispatch:

jobs:
  # ─── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: doodlevox_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Set up Android release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
              "${{ secrets.ANDROID_STORE_PASSWORD }}" \
              "${{ secrets.ANDROID_KEY_PASSWORD }}" \
              "${{ secrets.ANDROID_KEY_ALIAS }}" \
              "keystore.jks" \
              > android/key.properties
            echo "Release signing configured."
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set — falling back to debug signing."
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: doodlevox_mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: doodlevox_mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  # ─── Deploy to Play Store ─────────────────────────────────────────────────────
  deploy-play-store:
    name: Deploy to Play Store (production)
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Play Store "What's New" text
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          # Find the previous mobile tag (git tag --sort=-creatordate lists newest first)
          PREV_TAG=$(git tag --sort=-creatordate | grep "^mobile/" | awk -v cur="$CURRENT_TAG" '
            found { print; exit }
            $0 == cur { found=1 }
          ')

          if [ -n "$PREV_TAG" ]; then
            RAW=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}" -- doodlevox_mobile/ \
              | grep -v "^- MOBILE: update to v" \
              | sed 's/^- MOBILE: /- /' || true)
          else
            RAW=""
          fi

          [ -z "$RAW" ] && RAW="- Internal improvements and bug fixes"

          # Play Store "What's New" is capped at 500 characters per locale
          printf '%s' "$RAW" | head -c 500 > /tmp/whatsnew-en-US

          mkdir -p whatsnew
          cp /tmp/whatsnew-en-US whatsnew/whatsnew-en-US

      - name: Compute Play Store release name
        id: play_name
        run: |
          # Tag format: mobile/v0.1.4-build-14  →  "(14) 0.1.4"
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's|mobile/v||; s|-build-[0-9]*||')
          BUILD=$(echo "$TAG" | sed 's|.*-build-||')
          echo "name=(${BUILD}) ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download AAB artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: android-aab
          path: artifacts

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.createdbycapslock.doodlevox_mobile
          releaseFiles: artifacts/app-release.aab
          track: production
          releaseName: ${{ steps.play_name.outputs.name }}
          status: completed
          whatsNewDirectory: whatsnew

  # ─── iOS ─────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (unsigned xcarchive)
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: doodlevox_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS archive (no code sign)
        run: flutter build ipa --release --no-codesign

      - name: Zip xcarchive
        run: |
          cd build/ios/archive
          zip -r DoodleVox-iOS.xcarchive.zip Runner.xcarchive

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: doodlevox_mobile/build/ios/archive/DoodleVox-iOS.xcarchive.zip
          if-no-files-found: error

  # ─── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Uses GITHUB_TOKEN to push the CHANGELOG commit back to main.
          # If your main branch has push protection enabled, use a PAT secret instead.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes from git log
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          PREV_TAG=$(git tag --sort=-creatordate | grep "^mobile/" | awk -v cur="$CURRENT_TAG" '
            found { print; exit }
            $0 == cur { found=1 }
          ')

          if [ -n "$PREV_TAG" ]; then
            RAW=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}" -- doodlevox_mobile/ \
              | grep -v "^- MOBILE: update to v" \
              | sed 's/^- MOBILE: /- /' || true)
          else
            RAW=""
          fi

          [ -z "$RAW" ] && RAW="- Internal improvements and bug fixes"

          printf '%s\n' "$RAW" > /tmp/release_notes.txt
          echo "--- Release notes ---"
          cat /tmp/release_notes.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "doodlevox_mobile ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.txt
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/android-aab/app-release.aab
            artifacts/ios-xcarchive/DoodleVox-iOS.xcarchive.zip

      - name: Prepend entry to CHANGELOG.md
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's|mobile/v||')
          DATE=$(date -u +%Y-%m-%d)

          # Build the new entry as a temp file
          {
            printf '\n'
            printf '## [%s] — %s\n' "$VERSION" "$DATE"
            printf '\n'
            cat /tmp/release_notes.txt
            printf '\n'
          } > /tmp/new_entry.txt

          # Insert it after the "---" separator using Python (avoids sed multiline issues)
          python3 - <<'PYEOF'
          path = "doodlevox_mobile/CHANGELOG.md"

          with open(path) as f:
              lines = f.readlines()

          # Find the line index just after the "---" separator
          insert_at = len(lines)
          for i, line in enumerate(lines):
              if line.strip() == "---":
                  insert_at = i + 1
                  break

          with open("/tmp/new_entry.txt") as f:
              entry_lines = f.readlines()

          new_lines = lines[:insert_at] + entry_lines + lines[insert_at:]

          with open(path, "w") as f:
              f.writelines(new_lines)

          print(f"Inserted changelog entry after line {insert_at}")
          PYEOF

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doodlevox_mobile/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit."
          else
            git commit -m "chore: update mobile CHANGELOG for ${{ github.ref_name }} [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
